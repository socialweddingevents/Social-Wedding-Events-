
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Wedding Event</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f8f8f8;
}

header {
    background: #000;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
}

/* Button */
.book-btn {
    display: block;
    width: 220px;
    margin: 25px auto;
    padding: 14px;
    background: #25D366;
    color: white;
    text-align: center;
    border-radius: 8px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
}

/* WhatsApp Section */
.whatsapp-section {
    text-align: center;
    margin-top: 20px;
}

.whatsapp-details {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Social Wedding Event</h1>
</header>

<div class="container">

    <h2>Our Work</h2>

    <!-- IMPORTANT NOTE -->
    <p style="text-align:center; color:red;">
 </p>

    <div class="gallery">
        <!-- Example images (replace later) -->
        <img src="PHOTO_LINK">
    </div>

    <!-- Book Now Button -->
    <a href="#" class="book-btn" onclick="openWhatsApp()">Book Now on WhatsApp</a>

    <!-- WhatsApp Details -->
    <div class="whatsapp-section">
        <h3>Contact Details</h3>

        <div class="whatsapp-details">
            <p><strong>Business:</strong> Social Wedding Event</p>
            <p><strong>Phone:</strong> +91 8003283288</p>
            <p><strong>Service:</strong> Wedding & Event Management</p>
        </div>
    </div>

</div>

<script>

let phoneNumber = "918003283288";

function openWhatsApp() {
    let message = "Hello, I want to book Social Wedding Event!";
    let url = "https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
}

</script>

</body>
  </html>
