<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Wedding Event</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f6d365, #fda085);
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            animation: fadeInDown 1s;
        }

        header h1 {
            font-size: 3em;
            letter-spacing: 2px;
        }

        .container {
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            margin: 20px 0;
            font-size: 2em;
            animation: fadeIn 1s;
        }

        .gallery, .wedding-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
            animation: fadeIn 1s;
        }

        .gallery img, .wedding-types img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .gallery img:hover, .wedding-types img:hover {
            transform: scale(1.05);
        }

        .book-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            margin: 30px 0;
            transition: background 0.3s;
            animation: pulse 2s infinite;
            display: block;
            text-align: center;
        }

        .book-btn:hover {
            background: #1ebc59;
        }

        /* Photo Upload Section */
        .upload-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 40px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .upload-section h3 {
            margin-bottom: 20px;
            text-align: center;
            color: #555;
        }

        .upload-section input[type="file"] {
            display: block;
            margin: 0 auto;
            padding: 10px;
        }

        .uploaded-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .uploaded-photos img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .book-btn {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <header>
        <h1>Social Wedding Event</h1>
    </header>

    <div class="container">
        <h2>Welcome to Social Wedding Event</h2>
        
        <!-- Book Now Button -->
        <div style="text-align: center;">
            <a href="#" class="book-btn" onclick="openWhatsApp()">Book Now</a>
        </div>

        <!-- Wedding Types Section -->
        <h2 style="text-align: center; margin-top: 40px;">Types of Weddings We Offer</h2>
        <div class="wedding-types">
            <img src="https://via.placeholder.com/300" alt="Royal Wedding">
